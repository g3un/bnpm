name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: codeberg-small
    container:
      image: ghcr.io/astral-sh/uv:python3.10-alpine
    defaults:
      run:
        shell: sh

    steps:
      - name: Install CI prerequisites
        run: apk add --no-cache git nodejs

      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Check release tag
        env:
          FORGEJO_REF_NAME: ${{ github.ref_name }}
        run: uv run python scripts/create_forgejo_release.py --check-tag

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Create Forgejo release
        env:
          FORGEJO_SERVER_URL: ${{ github.server_url }}
          FORGEJO_REPOSITORY: ${{ github.repository }}
          FORGEJO_REF_NAME: ${{ github.ref_name }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: uv run python scripts/create_forgejo_release.py
